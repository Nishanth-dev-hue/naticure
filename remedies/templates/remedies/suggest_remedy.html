{% extends "remedies/base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto py-12">
    <div class="bg-white rounded-3xl shadow-xl shadow-emerald-100/50 border border-emerald-50 overflow-hidden">
        <div class="bg-emerald-600 p-8 text-white">
            <h2 class="text-3xl font-bold mb-2" data-translate="suggest_title">Suggest a Remedy</h2>
            <p class="text-emerald-100" data-translate="suggest_desc">Help us expand our traditional Indian home remedy database. Your suggestion will be reviewed by our admin team.</p>
        </div>
        
        <form id="suggest-form" class="p-8 space-y-8">
            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-2">
                    <label for="symptom" data-translate="symptom_label" class="block text-sm font-bold text-slate-700 uppercase tracking-wider">Symptom</label>
                    <input type="text" id="symptom" name="symptom" required 
                           placeholder="e.g. Dry Cough" data-translate-placeholder="symptom_placeholder"
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                </div>

                <div class="space-y-2">
                    <label for="remedy_name" data-translate="remedy_name_label" class="block text-sm font-bold text-slate-700 uppercase tracking-wider">Remedy Name</label>
                    <input type="text" id="remedy_name" name="remedy_name" required 
                           placeholder="e.g. Honey & Ginger" data-translate-placeholder="remedy_placeholder"
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <label for="ingredients" data-translate="ingredients_label" class="block text-sm font-bold text-slate-700 uppercase tracking-wider">Ingredients</label>
                <textarea id="ingredients" name="ingredients" required rows="3" 
                          placeholder="List the natural ingredients needed..." data-translate-placeholder="ingredients_placeholder"
                          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all resize-none"></textarea>
            </div>

            <div class="space-y-2">
                <label for="preparation_steps" data-translate="preparation_label" class="block text-sm font-bold text-slate-700 uppercase tracking-wider">Preparation Steps</label>
                <textarea id="preparation_steps" name="preparation_steps" required rows="5" 
                          placeholder="How to prepare and use this remedy?" data-translate-placeholder="preparation_placeholder"
                          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all resize-none"></textarea>
            </div>

            <div class="space-y-2">
                <label for="language" data-translate="language_label" class="block text-sm font-bold text-slate-700 uppercase tracking-wider">Language of Entry</label>
                <select id="language" name="language" required 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="english">English</option>
                    <option value="telugu">Telugu</option>
                    <option value="hindi">Hindi</option>
                </select>
            </div>

            <button type="submit" 
                    class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold text-lg hover:bg-emerald-700 transition-all shadow-lg hover:shadow-emerald-200 transform hover:-translate-y-1">
                <span data-translate="submit_btn">Submit for Review</span>
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const form = document.getElementById('suggest-form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('/api/suggest-remedy/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (result.status === 'success') {
                alert(getTranslation('suggest_success'));
                window.location.href = "{% url 'home' %}";
            }
        } catch (error) {
            console.error('Error submitting suggestion:', error);
            alert(getTranslation('suggest_error'));
        }
    });
</script>
{% endblock %}
