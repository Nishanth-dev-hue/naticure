{% extends "remedies/base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Admin Login</h2>
        <p class="text-gray-500 mt-2">Access the NatiCure control center</p>
    </div>
    
    <form method="POST" class="space-y-6">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                    {{ field.label }}
                </label>
                <input type="{{ field.field.widget.input_type }}" 
                       name="{{ field.html_name }}" 
                       id="{{ field.id_for_label }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition duration-200 outline-none"
                       placeholder="Enter your {{ field.label|lower }}">
                {% if field.errors %}
                    <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        
        <button type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md hover:shadow-lg transition duration-300 transform hover:-translate-y-1">
            Sign In
        </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-gray-500">
        <p>Only superusers can access the admin panel.</p>
    </div>
</div>
{% endblock %}
